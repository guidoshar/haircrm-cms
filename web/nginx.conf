server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip on this hop（hair-crm-nginx 不一定开，自己保险）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript application/json
        application/xml application/xml+rss application/rss+xml
        application/atom+xml application/manifest+json
        application/ld+json application/wasm
        font/ttf font/otf image/svg+xml;

    # 补 woff2 类型（不要 types{} 覆盖全局，用 add 的方式）
    location ~* \.woff2$ {
        default_type font/woff2;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 构建产物：内容哈希命名，长缓存
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # 字体目录（除 woff2 外的 .css 等）
    location /fonts/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # 图标 / 静态图：30 天
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # index.html 不缓存
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
